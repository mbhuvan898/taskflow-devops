name: Deploy TaskFlow

on:
push:
branches:
- main

jobs:

# ─────────────────────────────────────────────

# JOB 1 — Frontend → S3 + CloudFront

# ─────────────────────────────────────────────

deploy-frontend:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-node@v4
    with:
      node-version: 18

  - name: Install dependencies
    run: cd client && npm ci

  - name: Build frontend
    run: cd client && npm run build

  - name: Configure AWS
    uses: aws-actions/configure-aws-credentials@v4
    with:
      aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region:            ${{ secrets.AWS_REGION }}

  - name: Upload to S3
    run: |
      aws s3 sync client/build/ s3://${{ secrets.S3_BUCKET_NAME }} --delete

  - name: Invalidate CloudFront
    run: |
      aws cloudfront create-invalidation \
      --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
      --paths "/*"
```

# ─────────────────────────────────────────────

# JOB 2 — Backend → Build & Push to ECR

# ─────────────────────────────────────────────

deploy-backend:
runs-on: ubuntu-latest
needs: deploy-frontend

```
steps:
  - uses: actions/checkout@v4

  - name: Configure AWS
    uses: aws-actions/configure-aws-credentials@v4
    with:
      aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region:            ${{ secrets.AWS_REGION }}

  - name: Login to Amazon ECR
    run: |
      aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
      | docker login --username AWS --password-stdin \
      ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

  - name: Build Docker image
    run: |
      cd server
      docker build -t taskflow-backend .

  - name: Tag Docker image
    run: |
      docker tag taskflow-backend:latest \
      ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

  - name: Push Docker image
    run: |
      docker push \
      ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest
```

# ─────────────────────────────────────────────

# JOB 3 — Auto Scaling Rolling Deployment

# ─────────────────────────────────────────────

refresh-asg:
runs-on: ubuntu-latest
needs: deploy-backend

```
steps:
  - name: Configure AWS
    uses: aws-actions/configure-aws-credentials@v4
    with:
      aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region:            ${{ secrets.AWS_REGION }}

  - name: Start Instance Refresh
    run: |
      aws autoscaling start-instance-refresh \
      --auto-scaling-group-name ${{ secrets.AUTO_SCALING_GROUP_NAME }}
```
